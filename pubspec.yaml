name: blocker_windows
description: "Ainaa Desktop version."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  vector_graphics: ^1.1.18 #reduce the amount of clipping, masking, and overdraw in SVG
  flutter_screenutil: ^5.9.3
  provider: ^6.1.5
  bloc: ^9.0.0
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.0.0
  path_provider: ^2.1.5 #needed for hydrated_bloc
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  meta: ^1.16.0
  equatable: ^2.0.5
  get_it: ^8.0.3
  injectable: ^2.5.0
  logger: ^2.5.0
  mocktail: ^1.0.4
  intl_phone_number_input: ^0.7.4
  http: ^1.4.0
  url_launcher: ^6.3.2
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.4
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/batch/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/Almarai/Almarai-Light.ttf
          weight: 200
        - asset: assets/Almarai/Almarai-Regular.ttf
          weight: 400
        - asset: assets/Almarai/Almarai-ExtraBold.ttf
          weight: 900
        - asset: assets/Almarai/Almarai-Bold.ttf
          weight: 700